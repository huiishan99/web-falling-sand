<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Sand</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-monospace, "SFMono-Regular", Consolas, "Liberation Mono", monospace;
      --surface: #101318;
      --surface-soft: #151922;
      --line: #29303a;
      --line-strong: #76808d;
      --text: #d9dee7;
      --muted: #7d8794;
      --accent: #f0c15d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      padding: 0;
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: #0b0d10;
      color: var(--text);
      user-select: none;
      touch-action: none;
    }

    main {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
      width: 100vw !important;
      height: 100vh !important;
    }

    .toolbar {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      display: flex;
      width: 188px;
      flex-direction: column;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(16, 19, 24, 0.92);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
      cursor: move;
      touch-action: none;
    }

    .brand-title {
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand-mark {
      color: var(--muted);
      font-size: 11px;
    }

    .toolbar-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .section-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    button {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--surface-soft);
      color: var(--text);
      font: inherit;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--line-strong);
    }

    button.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .wide {
      width: 100%;
    }

    .button-grid .wide {
      grid-column: 1 / -1;
    }

    label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    .stat {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.7;
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    @media (max-width: 620px) {
      .toolbar {
        top: auto;
        right: 10px;
        bottom: 10px;
        left: 10px;
        width: auto;
        max-height: 45vh;
        overflow: auto;
      }
    }
  </style>
  <script src="p5.js"></script>
  <!-- <script src="../addons/p5.sound.js"></script> -->
  <script src="sketch.js"></script>
</head>

<body>
  <div class="toolbar" id="toolbar">
    <div class="brand">
      <div class="brand-title">Falling Sand</div>
      <div class="brand-mark">p5</div>
    </div>
    <div class="toolbar-group" role="group" aria-label="Tools">
      <div class="section-label">Tool</div>
      <div class="button-grid">
        <button class="active" type="button" data-tool="sand" title="Sand">Sand</button>
        <button type="button" data-tool="water" title="Water">Water</button>
        <button type="button" data-tool="wall" title="Wall">Wall</button>
        <button type="button" data-tool="erase" title="Eraser">Erase</button>
      </div>
    </div>
    <div class="toolbar-group" role="group" aria-label="Colors">
      <div class="section-label">Color</div>
      <div class="button-grid">
        <button class="active" type="button" data-color-mode="rainbow" title="Rainbow colors">Rainbow</button>
        <button type="button" data-color-mode="warm" title="Warm sand colors">Warm</button>
      </div>
    </div>
    <div class="toolbar-group">
      <label for="brush-size">Size <span id="brush-size-value">5</span></label>
      <input id="brush-size" type="range" min="1" max="19" step="2" value="5">
    </div>
    <div class="toolbar-group">
      <label for="sim-speed">Speed <span id="sim-speed-value">1x</span></label>
      <input id="sim-speed" type="range" min="1" max="4" step="1" value="1">
    </div>
    <div class="toolbar-group">
      <div class="button-grid">
        <button id="pause-toggle" type="button" title="Pause">Pause</button>
        <button id="step-grid" type="button" title="Step one frame">Step</button>
        <button id="clear-grid" class="wide" type="button" title="Clear">Clear</button>
      </div>
    </div>
    <div class="toolbar-group">
      <div class="stat" id="particle-count">0 sand<br>0 water<br>0 walls</div>
    </div>
  </div>
  <main id="canvas-host">
  </main>
</body>

</html>
